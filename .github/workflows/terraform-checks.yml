name: Terraform Checks (Lint + Security + Docs)

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/terraform-checks.yml'

env:
  TF_VERSION: '1.9'
  TF_WORKING_DIR: infrastructure

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: ${{ env.TF_WORKING_DIR }}

  security:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          framework: terraform
          output_format: cli
          quiet: true
          # Skip checks that are intentionally configured differently
          skip_check: CKV_AWS_119,CKV_AWS_145
          # CKV_AWS_119: DynamoDB uses on-demand (no need for provisioned encryption config)
          # CKV_AWS_145: S3 uses AES256 (SSE-S3) in dev, CMK in prod — intentional per environment

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: results.sarif
          retention-days: 7

  docs:
    name: Terraform Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Generate Terraform Docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: infrastructure/modules/identity,infrastructure/modules/mentoring,infrastructure/modules/engagement,infrastructure/modules/content,infrastructure/modules/networking,infrastructure/modules/analytics,infrastructure/modules/observability,infrastructure/modules/security
          output-file: README.md
          output-method: inject
          git-push: true
          git-commit-message: "docs: auto-generate terraform module documentation"
