name: CI - React Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-react.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    name: Build, Test & Accessibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --project host-shell/tsconfig.json

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Run Vitest tests with coverage
        run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile=../test-results/frontend-results.xml

      - name: Run axe-core accessibility checks
        run: |
          # Run accessibility tests (jest-axe integrated in component tests)
          npm run test -- --reporter=default --run 2>&1 | tee axe-results.txt
          
          # Check for accessibility violations in test output
          if grep -q "Expected the HTML.*to have no violations" axe-results.txt; then
            echo "::error::Accessibility violations detected by axe-core."
            exit 1
          fi
          echo "✓ axe-core accessibility checks passed."

      - name: Check accessibility score threshold
        run: |
          # Parse coverage/accessibility results
          # axe-core violations are caught in unit tests; here we verify the pass rate
          TOTAL_TESTS=$(grep -oP '\d+ test' axe-results.txt | head -1 | grep -oP '\d+' || echo "0")
          FAILED_TESTS=$(grep -oP '\d+ failed' axe-results.txt | head -1 | grep -oP '\d+' || echo "0")
          
          if [ "$TOTAL_TESTS" -gt 0 ]; then
            PASS_RATE=$(( (TOTAL_TESTS - FAILED_TESTS) * 100 / TOTAL_TESTS ))
            echo "Accessibility test pass rate: ${PASS_RATE}%"
            
            if [ "$PASS_RATE" -lt 90 ]; then
              echo "::error::Accessibility score ${PASS_RATE}% is below minimum threshold of 90%."
              exit 1
            fi
            echo "✓ Accessibility score ${PASS_RATE}% meets threshold (≥90%)."
          fi

      - name: Build all workspaces
        run: npm run build

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: test-results/
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/host-shell/dist/
            frontend/remotes/*/dist/
          retention-days: 1
