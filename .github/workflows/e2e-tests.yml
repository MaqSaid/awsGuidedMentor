name: E2E Tests (Playwright)

on:
  workflow_run:
    workflows: ["Deploy - Backend (Lambda Native AOT)", "Deploy - Frontend (S3 + CloudFront)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

env:
  NODE_VERSION: '22'

jobs:
  e2e:
    name: Playwright E2E against staging
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for staging to be healthy
        run: |
          BASE_URL="${{ vars.STAGING_URL }}"
          echo "Waiting for staging to be ready at ${BASE_URL}..."
          
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Staging is ready (attempt ${i})"
              break
            fi
            echo "  Attempt ${i}/30: HTTP ${STATUS}, waiting 10s..."
            sleep 10
          done
          
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging did not become healthy within 5 minutes."
            exit 1
          fi

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ vars.STAGING_URL }}
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/e2e-results.xml
          retention-days: 7

  promote-to-production:
    name: Request production promotion
    needs: [e2e]
    if: success()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production promotion approved
        run: |
          echo "✓ E2E tests passed on staging."
          echo "✓ Manual approval granted for production deployment."
          echo "Production deployment will be triggered by deploy workflows."
