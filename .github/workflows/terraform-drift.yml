name: Terraform Drift Detection

on:
  schedule:
    # Run nightly at 2:00 AM AEST (4:00 PM UTC previous day)
    - cron: '0 16 * * *'
  workflow_dispatch:

env:
  TF_VERSION: '1.9'
  TF_WORKING_DIR: infrastructure
  AWS_REGION: ap-southeast-2

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config="environments/staging/backend.hcl"

      - name: Terraform Plan (Drift Check)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="environments/staging/terraform.tfvars" \
            -detailed-exitcode \
            -out=drift-plan \
            -no-color 2>&1 | tee drift-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for Drift
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "::warning::Infrastructure drift detected! Resources have been modified outside of Terraform."
          echo ""
          echo "Drifted resources:"
          grep -E "^[[:space:]]+(~|\+|-)" ${{ env.TF_WORKING_DIR }}/drift-output.txt | head -50

      - name: Create Issue if Drift Detected
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ env.TF_WORKING_DIR }}/drift-output.txt', 'utf8');
            const truncated = output.length > 3000 ? output.substring(0, 3000) + '\n... (truncated)' : output;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Infrastructure Drift Detected — ${new Date().toISOString().split('T')[0]}`,
              body: `## Infrastructure Drift Detected\n\nThe nightly drift check found resources that have been modified outside of Terraform.\n\n### Plan Output\n\n\`\`\`\n${truncated}\n\`\`\`\n\n### Action Required\n\n1. Review the changes above\n2. If intentional: run \`terraform apply\` to update state\n3. If unintentional: revert the manual change\n4. If drift is expected (e.g., auto-scaling): add to \`.terraform-drift-ignore\`\n\n*This issue was auto-created by the drift detection workflow.*`,
              labels: ['infrastructure', 'drift', 'automated']
            });

      - name: No Drift
        if: steps.plan.outputs.exit_code == '0'
        run: echo "✓ No infrastructure drift detected. State matches deployed resources."
