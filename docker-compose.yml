services:
  postgres:
    image: postgres:16-alpine
    container_name: guidedmentor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guidedmentor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d guidedmentor"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
